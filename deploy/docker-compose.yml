services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paper_notebook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  vespa:
    image: vespaengine/vespa:8
    ports:
      - "8089:8080"
      - "19072:19071"
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      # Real readiness: 8080 only listens once the application package is
      # deployed and the container cluster is up. The `vespa-deploy` service
      # below performs that one-shot deploy; this healthcheck is what gates
      # backend startup.
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ApplicationStatus >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 120s
    restart: unless-stopped

  vespa-deploy:
    # Re-uses the backend image (which already ships `scripts/deploy_vespa.py`
    # and the `app` package). On every `compose up` it waits for the Vespa
    # config server, then uploads + activates the application package.
    # prepareandactivate is idempotent, so re-running on an already-deployed
    # cluster simply re-activates the same package.
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    image: ${BACKEND_IMAGE:-mistin1885/paper-notebook-agent-backend:v1.0.0}
    depends_on:
      vespa:
        # Cannot wait for vespa.service_healthy: the 8080 healthcheck only
        # passes AFTER this job deploys the package. service_started is
        # enough — we retry against the config server ourselves.
        condition: service_started
    command:
      - sh
      - -c
      - |
        echo "[vespa-deploy] waiting for vespa config server (vespa:19071)..."
        until curl -fsS http://vespa:19071/state/v1/health >/dev/null 2>&1; do
          sleep 3
        done
        echo "[vespa-deploy] config server ready, deploying application package..."
        exec python /app/scripts/deploy_vespa.py --config-url http://vespa:19071
    restart: "no"

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    image: ${BACKEND_IMAGE:-mistin1885/paper-notebook-agent-backend:v1.0.0}
    depends_on:
      postgres:
        condition: service_healthy
      vespa:
        condition: service_healthy
      vespa-deploy:
        condition: service_completed_successfully
    # Load project-root `.env` so LLM_* / MINERU_SERVER_URL / APP_ENCRYPTION_KEY
    # defined there flow into the container. Docker Compose only auto-loads
    # `.env` next to the compose file (i.e. `deploy/.env`), which would miss
    # the project-root one; `env_file:` makes the loading explicit. The
    # `environment:` block below still overrides docker-internal addresses
    # (DATABASE_URL / VESPA_ENDPOINT) because compose merges env_file values
    # first, then `environment:` on top.
    env_file:
      - path: ../.env
        required: false
    environment:
      # DB / Vespa are reachable by service name inside the compose network —
      # always override any host-port values from `.env`.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/paper_notebook
      VESPA_ENDPOINT: http://vespa:8080
      VESPA_ENABLED: "true"
      APP_ENV: production
      # MinerU vLLM server runs on the *host*. The user's `.env` likely uses
      # `http://localhost:8001` (correct for host-side `uv run`) but inside
      # a container `localhost` resolves to the container itself — so override
      # with `host.docker.internal` (added below via `extra_hosts`). A shell-
      # exported MINERU_SERVER_URL still wins via the interpolation default.
      MINERU_SERVER_URL: ${MINERU_SERVER_URL:-http://host.docker.internal:8001}
      # Allow the frontend container's browser-origin to call the API.
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-http://localhost:3010,http://127.0.0.1:3010}
    ports:
      - "9010:8000"
    volumes:
      # Persist uploaded PDFs and MinerU output across restarts.
      - backend_data:/app/data
    extra_hosts:
      # Lets the container reach the host's vLLM (MinerU @ :8001) on Linux.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
      args:
        # Intentionally unset so the bundle uses the /api-proxy relative prefix
        # and Next.js rewrites() forwards requests to the backend container.
        # Override only if you need direct absolute URL (e.g. local dev):
        #   NEXT_PUBLIC_API_BASE_URL=http://<host>:9010 docker compose build frontend
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: ${FRONTEND_IMAGE:-mistin1885/paper-notebook-agent-frontend:v1.0.0}
    depends_on:
      backend:
        condition: service_started
    environment:
      # Runtime env — read by the Route Handler proxy at request time.
      # Must point to the backend container via the internal Docker network.
      BACKEND_URL: http://backend:8000
    ports:
      - "3010:3000"
    restart: unless-stopped

volumes:
  # All three volumes are declared `external: true` so `docker compose down -v`
  # does NOT delete them. Chat / session / document persistence depends on
  # these surviving across stack restarts and accidental `-v`.
  #
  # First-time setup (creates the volumes if they don't exist):
  #   make data-volumes-init
  # or manually:
  #   docker volume create deploy_postgres_data
  #   docker volume create deploy_vespa_data
  #   docker volume create deploy_backend_data
  #
  # To intentionally wipe everything (the only path that nukes data):
  #   make data-volumes-purge
  postgres_data:
    external: true
    name: deploy_postgres_data
  vespa_data:
    external: true
    name: deploy_vespa_data
  backend_data:
    external: true
    name: deploy_backend_data
