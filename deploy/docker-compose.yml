services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: paper_notebook
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  vespa:
    image: vespaengine/vespa:8
    ports:
      - "8089:8080"
      - "19072:19071"
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:19071/state/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    image: paper-notebook-agent/backend:latest
    depends_on:
      postgres:
        condition: service_healthy
      vespa:
        condition: service_started
    environment:
      # DB / Vespa are reachable by service name inside the compose network.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/paper_notebook
      VESPA_ENDPOINT: http://vespa:8080
      VESPA_ENABLED: "true"
      # Encryption key — rotate in any real deployment.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-dev-only-change-me-32-bytes-base64}
      # MinerU vLLM server — runs on the host; from inside Linux containers,
      # the host is reachable via `host.docker.internal` (added below) or
      # set MINERU_SERVER_URL on the host before `docker compose up`.
      MINERU_SERVER_URL: ${MINERU_SERVER_URL:-http://host.docker.internal:8001}
      # Env-level fallback LLM (overridden per-chat by provider_profiles).
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-2048}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      LLM_CONTEXT_WINDOW: ${LLM_CONTEXT_WINDOW:-10000}
      # Allow the frontend container's browser-origin to call the API.
      CORS_EXTRA_ORIGINS: ${CORS_EXTRA_ORIGINS:-http://localhost:3010,http://127.0.0.1:3010}
      APP_ENV: production
    ports:
      - "9010:8000"
    volumes:
      # Persist uploaded PDFs and MinerU output across restarts.
      - backend_data:/app/data
    extra_hosts:
      # Lets the container reach the host's vLLM (MinerU @ :8001) on Linux.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
      args:
        # Intentionally unset so the bundle uses the /api-proxy relative prefix
        # and Next.js rewrites() forwards requests to the backend container.
        # Override only if you need direct absolute URL (e.g. local dev):
        #   NEXT_PUBLIC_API_BASE_URL=http://<host>:9010 docker compose build frontend
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    image: paper-notebook-agent/frontend:latest
    depends_on:
      backend:
        condition: service_started
    environment:
      # Runtime env — read by the Route Handler proxy at request time.
      # Must point to the backend container via the internal Docker network.
      BACKEND_URL: http://backend:8000
    ports:
      - "3010:3000"
    restart: unless-stopped

volumes:
  postgres_data:
  vespa_data:
  backend_data:
