# alembic.ini — Alembic configuration for Paper Notebook Agent
# sqlalchemy.url is injected dynamically in migrations/env.py (never hard-coded here)

[alembic]
script_location = migrations

# Template used for generating new revision files
file_template = %%(rev)s_%%(slug)s

# Truncate slug to a reasonable length
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command (not needed)
revision_environment = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
